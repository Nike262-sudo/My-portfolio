<section class="overview" id="problem">

    <div class="container">

        <div class="section-label">
            The Challenge
        </div>

        <div class="overview-grid">

            <div class="overview-content">

                <h2>
                    Most designers prepare alone.
                </h2>

                <p>
                    After speaking with aspiring product designers and reflecting on my own interview preparation, I noticed a recurring pattern. Most people relied on YouTube videos, blog articles, or random mock questions.
                </p>

                <p>
                    While these resources were helpful, they rarely recreated the pressure and unpredictability of an actual product design interview.
                </p>

                <p>
                    There was no structured way to practice communicating decisions, defending trade-offs, or receiving meaningful feedback.
                </p>

            </div>

            <div class="stats">

                <div class="stat">

                    <div class="stat-number">
                        01
                    </div>

                    <div class="stat-label">
                        No realistic interview simulation.
                    </div>

                </div>

                <div class="stat">

                    <div class="stat-number">
                        02
                    </div>

                    <div class="stat-label">
                        Generic feedback with no actionable direction.
                    </div>

                </div>

                <div class="stat">

                    <div class="stat-number">
                        03
                    </div>

                    <div class="stat-label">
                        No way to measure improvement over time.
                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- =======================================================
RESEARCH
======================================================= -->

<section class="overview">

    <div class="container">

        <div class="section-label">
            Research
        </div>

        <h2>
            Understanding how designers prepare today.
        </h2>

        <div class="overview-grid">

            <div>

                <p>
                    Rather than designing another collection of interview questions, I wanted to understand how designers currently prepare for interviews.
                </p>

                <p>
                    Most participants described preparation as inconsistent. Some rehearsed with friends, while others watched interview recordings repeatedly.
                </p>

            </div>

            <div>

                <p>
                    Many admitted they had no idea whether their answers were actually good until a real interview.
                </p>

                <p>
                    The biggest insight wasn't that designers lacked information—they lacked feedback. Learning happens through iteration, and interviews provide very few opportunities to practice before the real thing.
                </p>

                <p>
                    That became the central opportunity behind DesignMock AI.
                </p>

            </div>

        </div>

    </div>
